services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edip
      POSTGRES_PASSWORD: edip_dev_password
      POSTGRES_DB: edip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edip -d edip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://edip:edip_dev_password@postgres:5432/edip
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
